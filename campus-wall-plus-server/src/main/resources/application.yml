spring:
  application:
    name: campus-wall-plus-server
  profiles:
    active: dev

server:
  port: 8080

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 604800
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false

knife4j:
  enable: true
  setting:
    language: zh_cn

campus-wall:
  upload:
    local-dir: uploads
    url-prefix: /uploads/
    max-size: 5242880
